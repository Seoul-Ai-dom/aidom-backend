name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ES_URL: ${{ secrets.ES_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          envs: REGISTRY,IMAGE_NAME,GITHUB_SHA,DB_URL,DB_USERNAME,DB_PASSWORD,ES_URL
          script: |
            # GHCR 로그인
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 앱 배포
            NEW_IMAGE="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
            docker pull $NEW_IMAGE

            PREV_IMAGE=$(docker inspect aidom-backend --format='{{.Config.Image}}' 2>/dev/null || echo "")

            docker stop aidom-backend || true
            docker rm aidom-backend || true

            docker run -d \
              --name aidom-backend \
              -p 8080:8080 \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL \
              -e DB_USERNAME \
              -e DB_PASSWORD \
              -e ES_URL \
              $NEW_IMAGE

            # Health check: 최대 30초 대기, 5초 간격
            OK=false
            for i in $(seq 1 6); do
              if curl -sf http://localhost:8080/actuator/health; then
                OK=true
                break
              fi
              sleep 5
            done

            if [ "$OK" = false ]; then
              echo "Health check failed, rolling back..."
              docker stop aidom-backend || true
              docker rm aidom-backend || true
              if [ -n "$PREV_IMAGE" ]; then
                docker run -d \
                  --name aidom-backend \
                  -p 8080:8080 \
                  --restart unless-stopped \
                  -e SPRING_PROFILES_ACTIVE=prod \
                  -e DB_URL \
                  -e DB_USERNAME \
                  -e DB_PASSWORD \
                  -e ES_URL \
                  $PREV_IMAGE
              fi
              exit 1
            fi

            echo "Deploy succeeded: $NEW_IMAGE"
            docker image prune -f
