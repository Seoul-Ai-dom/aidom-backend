name: PR CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code format
        run: ./gradlew spotlessCheck

      - name: Build and test
        run: ./gradlew build
