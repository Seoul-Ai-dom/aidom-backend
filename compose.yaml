services:
  mysql:
    image: mysql:8.0
    container_name: aidom-mysql
    env_file:
      - .env
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
