server.port=8080

# Production - Environment Variable Based
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool (RDS)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=5000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT and OAuth2 (Prod)
app.auth.jwt.secret=${JWT_SECRET}
app.auth.jwt.access-token-validity=30m
app.auth.jwt.refresh-token-validity=14d
app.auth.jwt.auth-code-validity=60s
app.auth.oauth2.default-success-uri=${AUTH_SUCCESS_URI}
app.auth.oauth2.authorized-redirect-uris=${AUTH_REDIRECT_URIS}
app.auth.cors.allowed-origins=${AUTH_ALLOWED_ORIGINS}

# Kakao OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Actuator - health endpoint only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Elasticsearch
spring.data.elasticsearch.repositories.enabled=true
spring.elasticsearch.uris=${ES_URL}
spring.elasticsearch.username=${ES_USERNAME:}
spring.elasticsearch.password=${ES_PASSWORD:}
